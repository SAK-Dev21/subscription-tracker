{% extends "base.html" %}

{% block title %}Edit Subscription - SubTracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Edit Subscription</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('subscriptions.edit', id=subscription.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                    <div class="mb-3">
                        <label for="service_name" class="form-label">Service Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="service_name" name="service_name"
                               value="{{ subscription.service_name }}" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="cost" class="form-label">Cost (&pound;) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">&pound;</span>
                                <input type="number" class="form-control" id="cost" name="cost"
                                       step="0.01" min="0" value="{{ subscription.cost }}" required>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label for="billing_cycle" class="form-label">Billing Cycle <span class="text-danger">*</span></label>
                            <select class="form-select" id="billing_cycle" name="billing_cycle" required>
                                <option value="monthly" {% if subscription.billing_cycle == 'monthly' %}selected{% endif %}>Monthly</option>
                                <option value="weekly" {% if subscription.billing_cycle == 'weekly' %}selected{% endif %}>Weekly</option>
                                <option value="yearly" {% if subscription.billing_cycle == 'yearly' %}selected{% endif %}>Yearly</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="entertainment" {% if subscription.category == 'entertainment' %}selected{% endif %}>Entertainment</option>
                                <option value="food" {% if subscription.category == 'food' %}selected{% endif %}>Food &amp; Drink</option>
                                <option value="software" {% if subscription.category == 'software' %}selected{% endif %}>Software</option>
                                <option value="fitness" {% if subscription.category == 'fitness' %}selected{% endif %}>Fitness</option>
                                <option value="utilities" {% if subscription.category == 'utilities' %}selected{% endif %}>Utilities</option>
                                <option value="other" {% if subscription.category == 'other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label for="next_payment_date" class="form-label">Next Payment Date</label>
                            <input type="date" class="form-control" id="next_payment_date" name="next_payment_date"
                                   value="{{ subscription.next_payment_date.strftime('%Y-%m-%d') if subscription.next_payment_date else '' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="cancellation_url" class="form-label">Cancellation URL <span class="text-muted">(optional)</span></label>
                        <input type="url" class="form-control" id="cancellation_url" name="cancellation_url"
                               value="{{ subscription.cancellation_url or '' }}"
                               placeholder="https://...">
                    </div>

                    <div class="mb-4">
                        <label for="notes" class="form-label">Notes <span class="text-muted">(optional)</span></label>
                        <textarea class="form-control" id="notes" name="notes" rows="2">{{ subscription.notes or '' }}</textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-secondary">
                            <i class="bi bi-check-circle me-1"></i>Save Changes
                        </button>
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
