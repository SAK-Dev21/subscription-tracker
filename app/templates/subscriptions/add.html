{% extends "base.html" %}

{% block title %}Add Subscription - Subscription Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Add Subscription</h2>
    <form method="POST" action="{{ url_for('subscriptions.add') }}">
        <div class="form-group">
            <label for="service_name">Subscription Name</label>
            <input type="text" id="service_name" name="service_name" required>
        </div>
        <div class="form-group">
            <label for="cost">Cost (&pound;)</label>
            <input type="number" id="cost" name="cost" step="0.01" min="0" required>
        </div>
        <div class="form-group">
            <label for="billing_cycle">Billing Cycle</label>
            <select id="billing_cycle" name="billing_cycle">
                <option value="monthly">Monthly</option>
                <option value="weekly">Weekly</option>
                <option value="yearly">Yearly</option>
            </select>
        </div>
        <div class="form-group">
            <label for="next_payment_date">Next Payment Date</label>
            <input type="date" id="next_payment_date" name="next_payment_date">
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="e.g. Entertainment, Productivity">
        </div>
        <button type="submit" class="btn btn-primary">Add Subscription</button>
    </form>
</div>
{% endblock %}
