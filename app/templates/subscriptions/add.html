{% extends "base.html" %}

{% block title %}Add Subscription - SubTracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Subscription</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('subscriptions.add') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                    <div class="mb-3">
                        <label for="service_name" class="form-label">Service Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="service_name" name="service_name"
                               placeholder="e.g. Netflix" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="cost" class="form-label">Cost (&pound;) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">&pound;</span>
                                <input type="number" class="form-control" id="cost" name="cost"
                                       step="0.01" min="0" placeholder="0.00" required>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label for="billing_cycle" class="form-label">Billing Cycle <span class="text-danger">*</span></label>
                            <select class="form-select" id="billing_cycle" name="billing_cycle" required>
                                <option value="monthly">Monthly</option>
                                <option value="weekly">Weekly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="entertainment">Entertainment</option>
                                <option value="food">Food &amp; Drink</option>
                                <option value="software">Software</option>
                                <option value="fitness">Fitness</option>
                                <option value="utilities">Utilities</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label for="next_payment_date" class="form-label">Next Payment Date</label>
                            <input type="date" class="form-control" id="next_payment_date" name="next_payment_date">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="cancellation_url" class="form-label">Cancellation URL <span class="text-muted">(optional)</span></label>
                        <input type="url" class="form-control" id="cancellation_url" name="cancellation_url"
                               placeholder="https://...">
                    </div>

                    <div class="mb-4">
                        <label for="notes" class="form-label">Notes <span class="text-muted">(optional)</span></label>
                        <textarea class="form-control" id="notes" name="notes" rows="2"
                                  placeholder="Any notes about this subscription..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-1"></i>Add Subscription
                        </button>
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
